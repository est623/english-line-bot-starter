name: Daily LINE Push

on:
  schedule:
    - cron: "0 23 * * *" # UTC 23:00 = Asia/Taipei 07:00
  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render daily push
        run: |
          curl --fail --show-error --silent \
            -X POST "${{ secrets.DAILY_PUSH_URL }}" \
            -H "x-job-token: ${{ secrets.DAILY_PUSH_JOB_TOKEN }}"
